  help: "Relisez au besoin la section « La transformée de Fourier »."

- label: "À quoi sert un filtre passe-bas ?"
  type: uc
  response: 2
  answers:
     - "À ne préserver que les hautes fréquences (détails, contours)"
     - "À lisser l'image en ne préservant que les basses fréquences"
     - "À géoréférencer l'image"
     - "À augmenter la résolution spatiale"
  help: "Relisez au besoin la section « Filtrage fréquentiel »."

- label: "Quelle est la cause de l'aliasing (repliement de spectre) ?"
  type: uc
  response: 2
  answers:
     - "Une fréquence d'échantillonnage trop élevée"
     - "Une fréquence d'échantillonnage trop faible par rapport au contenu fréquentiel"
     - "Un mauvais géoréférencement"
     - "Un excès de bandes spectrales"
  help: "Relisez au besoin la section « L'aliasing »."

- label: "Une convolution dans l'espace image correspond à quelle opération dans l'espace de Fourier ?"
  type: uc
  response: 1
  answers:
     - "Une multiplication"
     - "Une addition"
     - "Une division"
     - "Une transposition"
  help: "Relisez au besoin la section « Filtrage fréquentiel »."

- label: "Avant de décimer fortement une image, pourquoi appliquer un filtre passe-bas (p. ex. gaussien) ?"
  type: uc
  response: 2
  answers:
     - "Pour augmenter le contraste"
     - "Pour réduire les hautes fréquences et éviter l'aliasing"
     - "Pour géoréférencer l'image"
     - "Pour convertir l'image en dB"
  help: "Relisez au besoin la section « L'aliasing »."

- label: "À quoi sert le filtre de Scharr utilisé dans le chapitre ?"
  type: uc
  response: 3
  answers:
     - "À lisser le bruit"
     - "À égaliser l'histogramme"
     - "À détecter les contours (gradients horizontaux et verticaux)"
     - "À segmenter l'image en objets"
  help: "Relisez au besoin la section « Filtrage par convolution »."

- label: "Pour quel type d'images le filtre de Lee est-il particulièrement utile ?"
  type: uc
  response: 2
