     - "Les images optiques RVB"
     - "Les images SAR dégradées par le speckle (bruit multiplicatif)"
     - "Les images hyperspectrales"
     - "Les images thermiques"
  help: "Relisez au besoin la section « Filtrage adaptatif »."

- label: "Dans le filtre de Lee, lorsque la variance locale est élevée, le coefficient K s'approche de 1, ce qui :"
  type: uc
  response: 1
  answers:
     - "préserve les détails de l'image d'origine"
     - "applique la moyenne locale (lissage maximal)"
     - "met le pixel à zéro"
     - "inverse le contraste"
  help: "Relisez au besoin la section « Filtrage adaptatif »."

- label: "Sur quels critères la méthode SLIC regroupe-t-elle les pixels en super-pixels ?"
  type: mc
  response: [1, 2]
  answers:
     - "La similarité de couleur entre pixels"
     - "La distance spatiale au centre du super-pixel"
     - "La date d'acquisition de l'image"
     - "Le système de projection cartographique"
  help: "Relisez au besoin la section « Super-pixel »."

- label: "Dans SLIC, quel est l'effet d'une valeur de compacité (m) élevée ?"
  type: uc
  response: 1
  answers:
     - "Les super-pixels sont plus réguliers/compacts et suivent moins le contenu de l'image"
     - "Les super-pixels épousent parfaitement les contours des objets"
     - "Le nombre de super-pixels augmente automatiquement"
     - "La segmentation devient aléatoire"
  help: "Relisez au besoin la section « Super-pixel »."

